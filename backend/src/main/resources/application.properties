# ============================================================
# Server Configuration
# ============================================================
server.port=8080

# ============================================================
# MySQL Database Configuration
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/job_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm2024
app.jwt.expiration=86400000

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads/resumes

# ============================================================
# AI Service Configuration
# ============================================================
app.ai-service.url=http://localhost:5000

# ============================================================
# Logging
# ============================================================
logging.level.com.jobportal=INFO
logging.level.org.springframework.security=INFO
