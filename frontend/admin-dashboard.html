<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — JobPortal AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="page-header"><h1>Admin Dashboard</h1><p>Manage your job portal</p></div>
    <div class="stats-grid" id="adminStats"></div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span class="card-title">Recent Applications</span></div>
        <div id="recentApps"><div class="spinner"></div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Quick Actions</span></div>
        <div style="display:flex;flex-direction:column;gap:12px;padding:1rem 0">
          <a href="admin-jobs.html" class="btn btn-primary btn-block">➕ Manage Jobs</a>
          <a href="admin-applicants.html" class="btn btn-secondary btn-block">👥 View Applicants</a>
        </div>
      </div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!api.requireAuth() || !api.isAdmin()) { window.location.href='index.html'; return; }
      renderNavbar('admin-dashboard');
      try {
        const jobs = await api.get('/jobs');
        let totalApps = 0, topScore = 0;
        const allApps = [];
        for (const j of jobs) {
          try {
            const apps = await api.get(`/applications/job/${j.id}`);
            totalApps += apps.length;
            apps.forEach(a => { allApps.push(a); if(a.matchScore > topScore) topScore = a.matchScore; });
          } catch {}
        }
        document.getElementById('adminStats').innerHTML = `
          <div class="stat-card"><div class="stat-icon blue">💼</div><div class="stat-info"><h3>${jobs.length}</h3><p>Active Jobs</p></div></div>
          <div class="stat-card"><div class="stat-icon purple">📋</div><div class="stat-info"><h3>${totalApps}</h3><p>Total Applications</p></div></div>
          <div class="stat-card"><div class="stat-icon green">🏆</div><div class="stat-info"><h3>${Math.round(topScore)}%</h3><p>Top Match Score</p></div></div>
          <div class="stat-card"><div class="stat-icon cyan">👥</div><div class="stat-info"><h3>${new Set(allApps.map(a=>a.userId)).size}</h3><p>Unique Candidates</p></div></div>`;

        const container = document.getElementById('recentApps');
        if (!allApps.length) { container.innerHTML = '<div class="empty-state"><p>No applications yet</p></div>'; return; }
        allApps.sort((a,b) => new Date(b.appliedAt) - new Date(a.appliedAt));
        container.innerHTML = allApps.slice(0,8).map(a => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-glass)">
            <div><strong>${a.userName}</strong><div style="color:var(--text-muted);font-size:0.8rem">${a.jobTitle}</div></div>
            <div style="text-align:right">
              <span style="font-weight:700;color:${a.matchScore>=70?'var(--accent-green)':a.matchScore>=40?'var(--accent-orange)':'var(--accent-red)'}">${Math.round(a.matchScore||0)}%</span>
              <div><span class="badge badge-${a.status==='ACCEPTED'?'green':a.status==='REJECTED'?'red':'blue'}" style="font-size:0.65rem">${a.status}</span></div>
            </div>
          </div>`).join('');
      } catch (err) { showToast(err.message, 'error'); }
    });
  </script>
</body>
</html>
