<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applicants — JobPortal AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="page-header"><h1>Candidate Rankings</h1><p>View applicants ranked by AI match score</p></div>
    <div class="form-group" style="max-width:400px;margin-bottom:1.5rem">
      <label class="form-label">Select Job</label>
      <select id="jobSelect" class="form-control"><option value="">Loading jobs...</option></select>
    </div>
    <div id="applicantsList"></div>
  </main>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!api.requireAuth() || !api.isAdmin()) { window.location.href='index.html'; return; }
      renderNavbar('admin-applicants');
      try {
        const jobs = await api.get('/jobs');
        const select = document.getElementById('jobSelect');
        select.innerHTML = '<option value="">— Select a job —</option>' +
          jobs.map(j => `<option value="${j.id}">${j.title} (${j.company})</option>`).join('');
        select.addEventListener('change', () => { if(select.value) loadApplicants(select.value); });

        // Auto-load from URL param
        const urlJob = new URLSearchParams(window.location.search).get('jobId');
        if (urlJob) { select.value = urlJob; loadApplicants(urlJob); }
      } catch (err) { showToast(err.message, 'error'); }
    });

    async function loadApplicants(jobId) {
      const c = document.getElementById('applicantsList');
      c.innerHTML = '<div class="spinner"></div>';
      try {
        const apps = await api.get(`/applications/job/${jobId}`);
        if (!apps.length) { c.innerHTML = '<div class="empty-state"><h3>No applicants yet</h3></div>'; return; }
        c.innerHTML = `<div class="table-container"><table>
          <thead><tr><th>#</th><th>Candidate</th><th>Email</th><th>Resume</th><th>Match Score</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${apps.map((a, i) => `<tr>
            <td style="font-weight:700;color:${i===0?'var(--accent-green)':'var(--text-muted)'}">${i+1}</td>
            <td><strong>${a.userName}</strong></td>
            <td style="color:var(--text-muted)">${a.userEmail}</td>
            <td>${a.resumeFileName}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div class="progress-bar" style="width:100px"><div class="progress-fill" style="width:${a.matchScore||0}%;background:${a.matchScore>=70?'var(--gradient-success)':a.matchScore>=40?'linear-gradient(135deg,#f59e0b,#ef4444)':'var(--gradient-danger)'}"></div></div>
                <span style="font-weight:700">${Math.round(a.matchScore||0)}%</span>
              </div>
            </td>
            <td>
              <select class="form-control" style="width:130px;padding:6px 10px;font-size:0.8rem" onchange="updateStatus(${a.id}, this.value)">
                <option value="PENDING" ${a.status==='PENDING'?'selected':''}>Pending</option>
                <option value="REVIEWED" ${a.status==='REVIEWED'?'selected':''}>Reviewed</option>
                <option value="ACCEPTED" ${a.status==='ACCEPTED'?'selected':''}>Accepted</option>
                <option value="REJECTED" ${a.status==='REJECTED'?'selected':''}>Rejected</option>
              </select>
            </td>
            <td><button class="btn btn-secondary btn-sm" onclick="viewMatch(${a.id})">Details</button></td>
          </tr>`).join('')}</tbody></table></div>`;
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function updateStatus(appId, status) {
      try { await api.put(`/applications/${appId}/status`, { status }); showToast('Status updated', 'success'); }
      catch (err) { showToast(err.message, 'error'); }
    }

    function viewMatch(id) { window.location.href = `match-results.html?id=${id}`; }
  </script>
</body>
</html>
