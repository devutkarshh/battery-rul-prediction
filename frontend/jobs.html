<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Listings — JobPortal AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem">
      <div><h1>Job Listings</h1><p>Find your perfect role</p></div>
      <div style="display:flex;gap:10px">
        <input type="text" id="searchInput" class="form-control" placeholder="Search jobs..." style="width:280px">
        <button class="btn btn-primary" onclick="loadJobs()">Search</button>
      </div>
    </div>
    <div class="grid-3" id="jobsList"><div class="spinner"></div></div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/jobs.js"></script>
</body>
</html>
